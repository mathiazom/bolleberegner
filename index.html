<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolleberegner</title>
  <link rel="icon" id="favicon" type="image/png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: #fdf6ee;
      font-family: 'Georgia', serif;
      color: #4a2c0a;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem 1rem;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: 0.04em;
      font-weight: normal;
    }

    h1 img {
      height: 0.9em;
      width: auto;
      vertical-align: -0.1em;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: clamp(1rem, 3vw, 1.3rem);
    }

    label {
      opacity: 0.75;
    }

    input[type=number] {
      width: 5ch;
      font-size: inherit;
      font-family: inherit;
      color: inherit;
      background: transparent;
      border: none;
      border-bottom: 2px solid #c47c2b;
      outline: none;
      text-align: center;
      padding: 0.1em 0.2em;
    }

    /* Hide spinners */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number] { -moz-appearance: textfield; }

    .result {
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      opacity: 0.6;
      min-height: 1.4em;
    }

    #grid {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-wrap: wrap;
      align-content: center;
      justify-content: center;
      gap: 12px;
      padding: 0 1rem 1rem;
    }

    #grid img {
      object-fit: contain;
      display: block;
    }

    #too-many {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
    }

    #too-many.visible {
      display: flex;
    }

    #ring-container {
      position: relative;
    }

    #ring-buns {
      position: absolute;
      inset: 0;
      animation: spin 14s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .ring-bun {
      animation: self-spin 3s linear infinite;
    }

    @keyframes self-spin {
      to { transform: rotate(360deg); }
    }

    #ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.2em;
    }

    #ring-count {
      font-size: clamp(3rem, 12vw, 7rem);
      font-weight: bold;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    #ring-label {
      font-size: clamp(0.85rem, 2.5vw, 1.1rem);
      opacity: 0.6;
    }

    .ring-bun {
      position: absolute;
      object-fit: contain;
    }

    #infinity-mode {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
    }

    #infinity-mode.visible {
      display: flex;
    }

    #infinity-container {
      position: relative;
    }

    .inf-bun {
      position: absolute;
      object-fit: contain;
      animation: self-spin 2s linear infinite;
    }
  </style>
</head>
<body>
  <header>
    <h1>B<img id="title-bun" alt="o">lleberegner</h1>
    <div class="input-row">
      <label for="people">Antall personer:</label>
      <input type="number" id="people" min="0" autocomplete="off">
    </div>
    <p class="result" id="result"></p>
  </header>
  <div id="grid"></div>
  <div id="infinity-mode">
    <div id="infinity-container"></div>
  </div>
  <div id="too-many">
    <div id="ring-container">
      <div id="ring-buns"></div>
      <div id="ring-center">
        <span id="ring-count"></span>
        <span id="ring-label"></span>
      </div>
    </div>
  </div>

  <script>
    const IMAGES = ['bun1.png', 'bun2.png', 'bun3.png', 'bun4.png'];

    document.getElementById('title-bun').src = IMAGES[Math.floor(Math.random() * IMAGES.length)];
    document.getElementById('favicon').href = IMAGES[Math.floor(Math.random() * IMAGES.length)];

    const input = document.getElementById('people');
    const result = document.getElementById('result');
    const grid = document.getElementById('grid');
    const tooMany = document.getElementById('too-many');
    const infinityMode = document.getElementById('infinity-mode');
    const infinityContainer = document.getElementById('infinity-container');
    const ringContainer = document.getElementById('ring-container');
    const ringCount = document.getElementById('ring-count');
    const ringLabel = document.getElementById('ring-label');

    // Lemniscate of Bernoulli: x = a·cos(t)/(1+sin²(t)), y = a·sin(t)·cos(t)/(1+sin²(t))
    function lemniscate(t, a) {
      const d = 1 + Math.sin(t) ** 2;
      return { x: a * Math.cos(t) / d, y: a * Math.sin(t) * Math.cos(t) / d };
    }

    let infAnimId = null;
    let infAngle = 0;

    function startInfinity() {
      const N = 24;
      infinityContainer.innerHTML = '';

      const w = infinityMode.clientWidth;
      const h = infinityMode.clientHeight;
      const bunSize = Math.min(w, h) * 0.1;
      const a = Math.min(w * 0.38, h * 0.7);

      infinityContainer.style.width = w + 'px';
      infinityContainer.style.height = h + 'px';

      for (let i = 0; i < N; i++) {
        const img = document.createElement('img');
        img.className = 'inf-bun';
        img.src = IMAGES[Math.floor(Math.random() * IMAGES.length)];
        img.alt = 'bolle';
        img.style.width = bunSize + 'px';
        img.style.height = bunSize + 'px';
        infinityContainer.appendChild(img);
      }

      function frame() {
        infAngle += 0.012;
        const buns = infinityContainer.querySelectorAll('.inf-bun');
        const cw = infinityContainer.clientWidth;
        const ch = infinityContainer.clientHeight;
        buns.forEach((bun, i) => {
          const t = infAngle + (i / buns.length) * 2 * Math.PI;
          const { x, y } = lemniscate(t, a);
          const s = parseFloat(bun.style.width);
          bun.style.left = `calc(50% + ${x}px - ${s / 2}px)`;
          bun.style.top  = `calc(50% + ${y}px - ${s / 2}px)`;
        });
        infAnimId = requestAnimationFrame(frame);
      }

      if (infAnimId) cancelAnimationFrame(infAnimId);
      infAnimId = requestAnimationFrame(frame);
    }

    function stopInfinity() {
      if (infAnimId) { cancelAnimationFrame(infAnimId); infAnimId = null; }
      infinityContainer.innerHTML = '';
    }

    function buildRing(boller) {
      ringCount.textContent = boller;
      ringLabel.textContent = boller === 1 ? 'bolle' : 'boller';

      const ringBuns = document.getElementById('ring-buns');
      ringBuns.innerHTML = '';

      const avail = Math.min(tooMany.clientWidth, tooMany.clientHeight) * 0.85;
      const bunSize = avail * 0.18;
      const radius = (avail - bunSize) / 2;
      const N = 10;

      ringContainer.style.width = avail + 'px';
      ringContainer.style.height = avail + 'px';

      for (let i = 0; i < N; i++) {
        const angle = (i / N) * 2 * Math.PI - Math.PI / 2;
        const img = document.createElement('img');
        img.className = 'ring-bun';
        img.src = IMAGES[Math.floor(Math.random() * IMAGES.length)];
        img.alt = 'bolle';
        img.style.width = bunSize + 'px';
        img.style.height = bunSize + 'px';
        img.style.left = `calc(50% + ${Math.cos(angle) * radius}px - ${bunSize / 2}px)`;
        img.style.top = `calc(50% + ${Math.sin(angle) * radius}px - ${bunSize / 2}px)`;
        ringBuns.appendChild(img);
      }
    }

    // Always keep input focused
    document.addEventListener('focusout', () => input.focus(), true);
    input.focus();

    const folk = new URLSearchParams(window.location.search).get('folk');
    if (folk) input.value = folk;

    // Clear on Escape or 'c'
    input.addEventListener('keydown', e => {
      if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
        e.preventDefault();
        input.value = '';
        update();
      }
    });

    input.addEventListener('input', update);
    window.addEventListener('resize', update);

    const GAP = 12;
    const MAX_SIZE = 300;

    function calcSize(n) {
      const w = grid.clientWidth;
      const h = grid.clientHeight;
      if (n === 0 || w === 0 || h === 0) return 0;
      const ratio = w / h;
      const cols = Math.ceil(Math.sqrt(n * ratio));
      const rows = Math.ceil(n / cols);
      return Math.min(MAX_SIZE, Math.floor(Math.min(
        (w - GAP * (cols - 1)) / cols,
        (h - GAP * (rows - 1)) / rows
      ) * 0.9));
    }

    function update() {
      const raw = parseInt(input.value) || 0;

      if (raw > 0) {
        history.replaceState(null, '', '?folk=' + raw);
      } else {
        history.replaceState(null, '', window.location.pathname);
      }
      const boller = raw > 0 ? Math.ceil(40 / 60 * raw) : 0;

      const isInfinity = raw > 10000;
      const isRing = !isInfinity && raw > 1000;
      const isGrid = !isInfinity && !isRing;

      grid.style.display = isGrid ? '' : 'none';
      tooMany.classList.toggle('visible', isRing);
      infinityMode.classList.toggle('visible', isInfinity);

      if (isInfinity) {
        result.textContent = '';
        startInfinity();
        return;
      }

      stopInfinity();

      if (isRing) {
        result.textContent = '';
        buildRing(boller);
        return;
      }

      result.textContent = boller > 0 ? `= ${boller} ${boller === 1 ? 'bolle' : 'boller'}` : '';

      while (grid.children.length > boller) grid.lastChild.remove();
      while (grid.children.length < boller) {
        const img = document.createElement('img');
        img.src = IMAGES[Math.floor(Math.random() * IMAGES.length)];
        img.alt = 'bolle';
        grid.appendChild(img);
      }

      const size = calcSize(boller);
      for (const img of grid.children) {
        img.style.width = size + 'px';
        img.style.height = size + 'px';
      }
    }

    update();

    // Keep layout within the visible viewport (handles mobile keyboard)
    if (window.visualViewport) {
      const fitViewport = () => {
        document.body.style.height = window.visualViewport.height + 'px';
        update();
      };
      window.visualViewport.addEventListener('resize', fitViewport);
      fitViewport();
    }
  </script>
</body>
</html>
